services:
  crawler:
    container_name: skkuverse-crawler
    build:
      context: .
      dockerfile: Dockerfile
      additional_contexts:
        repo-root: ..
    env_file: .env
    environment:
      - CRAWLER_ENV=production
      - LOG_FORMAT=json
      - AI_SERVICE_URL=http://ai:4000
      - SOURCES_JSON_PATH=/sources.json
      - TZ=Asia/Seoul
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    networks:
      - skkuverse
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  skkuverse:
    external: true
