services:
  crawler:
    container_name: skkuverse-crawler
    build: .
    env_file: .env
    environment:
      - CRAWLER_ENV=production
      - LOG_FORMAT=json
      - CRAWL_DEPT_FILTER=skku-main,cal-undergrad,bio-undergrad,nano,dorm-hssc,medicine,cheme,lib-hssc,lib-nsc,lib-all,skku-notice02,skku-notice04,skku-notice05,skku-notice06,skku-notice07
      - AI_SERVICE_URL=http://ai:4000
      - TZ=Asia/Seoul
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    networks:
      - skkuverse
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  skkuverse:
    external: true
